<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EditorLens v2 — Preview</title>
  <style>
    :root {
      --bg-deep: #0d0d0d;
      --bg-chrome: #141414;
      --bg-panel: #1e1e1e;
      --bg-surface: #2a2a2a;
      --bg-hover: #333;
      --bg-active: #1a3a5c;
      --text-primary: #e0e0e0;
      --text-secondary: #999;
      --text-muted: #666;
      --border: #2a2a2a;
      --border-light: #333;
      --accent: #4dabf7;
      --accent-dim: #1a3a5c;
      --positive: #4caf50;
      --negative: #ef5350;
      --warning: #ff9800;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg-deep); font-family: var(--font); color: var(--text-primary); -webkit-font-smoothing: antialiased; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    /* ========================================
       Spectrum Web Component stubs
       High-fidelity replicas for browser preview
       ======================================== */

    /* sp-button */
    sp-button {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0 14px; height: 32px; border-radius: 4px;
      font-size: 12px; font-weight: 500; font-family: var(--font);
      cursor: pointer; border: 1px solid #555; background: var(--bg-surface);
      color: var(--text-primary); transition: all 0.15s ease; user-select: none;
      white-space: nowrap; gap: 6px; line-height: 1;
    }
    sp-button:hover { background: var(--bg-hover); border-color: #666; }
    sp-button:active { transform: scale(0.97); }
    sp-button[variant="accent"] { background: var(--accent); color: #fff; border-color: transparent; }
    sp-button[variant="accent"]:hover { background: #3d9be6; }
    sp-button[variant="secondary"] { background: transparent; color: var(--text-secondary); border-color: #444; }
    sp-button[variant="secondary"]:hover { background: var(--bg-surface); color: var(--text-primary); }
    sp-button[variant="negative"] { background: var(--negative); color: #fff; border-color: transparent; }
    sp-button[variant="negative"]:hover { background: #d32f2f; }
    sp-button[variant="cta"] { background: var(--accent); color: #fff; border-color: transparent; }
    sp-button[disabled] { opacity: 0.35; pointer-events: none; }
    sp-button[size="s"] { height: 26px; padding: 0 10px; font-size: 11px; }

    /* sp-textfield — rendered by custom element, this styles the wrapper */
    sp-textfield { display: block; position: relative; }

    /* sp-progress-bar — rendered by custom element */
    sp-progress-bar { display: block; border-radius: 3px; overflow: hidden; }

    /* sp-divider */
    sp-divider { display: block; height: 1px; background: var(--border-light); margin: 8px 0; }

    /* sp-action-button */
    sp-action-button {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0 10px; height: 28px; background: transparent;
      color: var(--text-secondary); border: 1px solid transparent;
      border-radius: 4px; font-size: 11px; font-weight: 500; font-family: var(--font);
      cursor: pointer; transition: all 0.12s ease; user-select: none;
    }
    sp-action-button:hover { background: var(--bg-surface); color: var(--text-primary); }
    sp-action-button[selected] { background: var(--accent-dim); color: var(--accent); border-color: rgba(77,171,247,0.3); }

    /* sp-action-group */
    sp-action-group { display: inline-flex; gap: 2px; }
    sp-action-group[compact] { gap: 0; border-radius: 4px; overflow: hidden; border: 1px solid #333; }
    sp-action-group[compact] sp-action-button { border-radius: 0; border: none; border-right: 1px solid #333; }
    sp-action-group[compact] sp-action-button:last-child { border-right: none; }

    /* sp-help-text */
    sp-help-text { display: block; font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
    sp-help-text[variant="negative"] { color: var(--negative); }

    /* Animations */
    @keyframes sp-ind {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    // ================================================================
    // Custom Element Registration — interactive Spectrum stubs
    // ================================================================

    class SpTextfield extends HTMLElement {
      connectedCallback() {
        if (this.querySelector('input')) return;
        const input = document.createElement('input');
        input.type = this.getAttribute('type') || 'text';
        input.placeholder = this.getAttribute('placeholder') || '';
        input.value = this.getAttribute('value') || '';
        Object.assign(input.style, {
          width: '100%', padding: '7px 12px', background: '#1e1e1e',
          border: '1px solid #444', borderRadius: '4px', color: '#e0e0e0',
          fontSize: '12px', fontFamily: 'inherit', outline: 'none',
          transition: 'border-color 0.15s ease, box-shadow 0.15s ease',
        });
        input.addEventListener('input', (e) => {
          this.dispatchEvent(new Event('input', { bubbles: true }));
          Object.defineProperty(this, 'value', { value: e.target.value, writable: true, configurable: true });
        });
        input.addEventListener('keydown', (e) => {
          this.dispatchEvent(new KeyboardEvent('keydown', { key: e.key, bubbles: true }));
        });
        input.addEventListener('focus', () => {
          input.style.borderColor = '#4dabf7';
          input.style.boxShadow = '0 0 0 1px rgba(77,171,247,0.25)';
        });
        input.addEventListener('blur', () => {
          input.style.borderColor = '#444';
          input.style.boxShadow = 'none';
        });
        this.appendChild(input);
        Object.defineProperty(this, 'value', { value: input.value, writable: true, configurable: true });
      }
      static get observedAttributes() { return ['value']; }
      attributeChangedCallback(name, old, val) {
        if (name === 'value') {
          const input = this.querySelector('input');
          if (input && input.value !== val) input.value = val || '';
        }
      }
    }

    class SpButton extends HTMLElement {
      connectedCallback() {
        this.setAttribute('role', 'button');
        this.tabIndex = 0;
        this.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); this.click(); }
        });
      }
    }

    class SpProgressBar extends HTMLElement {
      connectedCallback() {
        this.setAttribute('role', 'progressbar');
        this._render();
      }
      static get observedAttributes() { return ['value', 'max', 'indeterminate']; }
      attributeChangedCallback() { this._render(); }
      _render() {
        const ind = this.hasAttribute('indeterminate');
        const val = parseFloat(this.getAttribute('value')) || 0;
        const max = parseFloat(this.getAttribute('max')) || 100;
        const pct = ind ? 30 : Math.min(100, (val / max) * 100);
        const existingStyle = this.getAttribute('style') || '';
        this.style.cssText = existingStyle + ';display:block;height:4px;background:#2a2a2a;border-radius:3px;overflow:hidden;position:relative;';
        this.innerHTML = '<div style="height:100%;background:linear-gradient(90deg,#4dabf7,#74c0fc);border-radius:3px;width:'
          + pct + '%;transition:width 0.4s cubic-bezier(0.4,0,0.2,1);'
          + (ind ? 'animation:sp-ind 1.5s ease-in-out infinite;' : '') + '"></div>';
      }
    }

    class SpDivider extends HTMLElement {
      connectedCallback() { this.setAttribute('role', 'separator'); }
    }

    class SpActionButton extends HTMLElement {
      connectedCallback() {
        this.setAttribute('role', 'button');
        this.tabIndex = 0;
        this.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); this.click(); }
        });
      }
    }

    class SpActionGroup extends HTMLElement {}
    class SpHelpText extends HTMLElement {}

    customElements.define('sp-textfield', SpTextfield);
    customElements.define('sp-button', SpButton);
    customElements.define('sp-progress-bar', SpProgressBar);
    customElements.define('sp-divider', SpDivider);
    customElements.define('sp-action-button', SpActionButton);
    customElements.define('sp-action-group', SpActionGroup);
    customElements.define('sp-help-text', SpHelpText);
  </script>
</body>
</html>
